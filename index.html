<html lang="en" class="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LBmedia - The Free Encyclopedia</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        typography: (theme) => ({
                            DEFAULT: {
                                css: {
                                    color: theme("colors.gray.900"),
                                    a: {
                                        color: theme("colors.blue.600"),
                                        "&:hover": { color: theme("colors.blue.500") },

                            },
                        }),
                    },
                },
            };
        </script>
        <style type="text/tailwindcss">
            @layer utilities {
                .custom-scrollbar::-webkit-scrollbar {
                    width: 6px;
                }
                .custom-scrollbar::-webkit-scrollbar-track {
                    background: transparent;

                .custom-scrollbar::-webkit-scrollbar-thumb {

        </style>
        <script src="https://unpkg.com/lucide@latest"></script>
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
            import {
                getAuth,
                signInWithEmailAndPassword,
                createUserWithEmailAndPassword,
                signOut,
                onAuthStateChanged,
                signInAnonymously,
                signInWithCustomToken,
                setPersistence,
                browserLocalPersistence
            } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
            import {
                getFirestore,
                collection,
                doc,
                setDoc,
                getDoc,
                getDocs,
                onSnapshot,
                addDoc,
                updateDoc,
                deleteDoc,
                runTransaction,
            } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
            const firebaseConfig = {
                apiKey: "AIzaSyA_XrD0M2R-V0IvU_lrxlZ82wIp_K7QoCg",
                authDomain: "error-inc.firebaseapp.com",
                databaseURL: "https://error-inc-default-rtdb.firebaseio.com",
                projectId: "error-inc",
                storageBucket: "error-inc.firebasestorage.app",
                messagingSenderId: "876188868410",
                appId: "1:876188868410:web:ca7de451707bd9975c7a03",
            };
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== "undefined" ? __app_id : "lbmedia-app";
            const getPublicCol = (colName) => collection(db, "artifacts", appId, "public", "data", colName);
            const getPrivateCol = (uid, colName) => collection(db, "artifacts", appId, "users", uid, colName);
            const isWikiProtectedPage = (title) => {
                return (title || "").trim().toLowerCase().startsWith("wiki:");
            };
            const isAdminUser = (userData) => {
                return userData?.username === "xerrortm";
            };
            const state = {
                user: null,
                userData: null,
                darkMode: false,
                articles: [],
                drafts: [],
                notifications: [],
                currentView: "home", // home, article, editor, dashboard
                activeArticleId: null,
                activeDraftId: null,
                authModalOpen: false,
                authMode: "login",
                searchQuery: "",
                featuredArticleId: null,
                editor: { title: "", content: "", isSaving: false, isPublishing: false, lastSaved: null },
            };
            let unsubscribers = [];
            let autoSaveTimer = null;
            const parseTable = (table) => {
                let html = '<table class="w-full border border-gray-300 dark:border-gray-700 my-6 rounded-xl overflow-hidden">';
                const lines = table.split("\n").map(l => l.trim()).filter(l => l && l !== "|}" && l !== "{|");
                for (const line of lines) {
                    if (line.startsWith("|-")) {
                        html += "</tr><tr>";
                    } 
                    else if (line.startsWith("!")) {
                        html += "<tr>";
                        html += line.substring(1).split("!!").map(c => `<th class="border px-3 py-2 bg-gray-100 dark:bg-gray-800 text-left">${c.trim()}</th>`).join("");
                        html += "</tr>";
                    } 
                    else if (line.startsWith("|")) {
                        html += "<tr>";
                        html += line.substring(1).split("||").map(c => `<td class="border px-3 py-2">${c.trim()}</td>`).join("");
                        html += "</tr>";
                    }
                }
                html += "</table>";
                return html;
            };
            const escapeHtml=t=>t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
            const highlightSyntax = (text) => {
                return text
                .replace(/\[\[(.*?)\]\]/g,'<span style="color:#8B5A2B;font-weight:600">[[$1]]</span>')
                .replace(/'''(.*?)'''/g,'<span style="color:#22c55e;font-weight:600">'''$1'''</span>')
                .replace(/''(.*?)''/g,'<span style="color:#22c55e;font-weight:600">\'\'$1\'\'</span>')
                .replace(/__(.*?)__/g,'<span style="color:#22c55e;font-weight:600">__$1__</span>')
                .replace(/\{\{Infobox/g,'<span style="color:#f59e0b;font-weight:700">{{Infobox</span>')
                .replace(/\}\}/g,'<span style="color:#f59e0b;font-weight:700">}}</span>')
                .replace(/\|\s*([a-zA-Z0-9_]+)\s*=/g,'<span style="color:#f59e0b;font-weight:700">| $1 =</span>')
                .replace(/=/g,'<span style="color:#f59e0b;font-weight:700">=</span>')
                .replace(/\{\|/g,'<span style="color:#f59e0b;font-weight:700">{|</span>')
                .replace(/\|\-/g,'<span style="color:#f59e0b;font-weight:700">|-</span>')
                .replace(/(^|\n)!/g,'$1<span style="color:#22c55e;font-weight:700">!</span>')
                .replace(/\|\|/g,'<span style="color:#38bdf8;font-weight:700">||</span>')
                .replace(/(^|\n)\|/g,'$1<span style="color:#38bdf8;font-weight:700">|</span>');
            };
            const parseWiki=t=>{
                if(!t)return{html:"",toc:[]};
                let s=t.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi,""),
                s = highlightSyntax(s);
                toc=[],refs=[],blocks=[];
                s=s.replace(/```(\w+)?\n?([\s\S]*?)```/g,(m,l,c)=>{
                    let id=blocks.length;
                    blocks.push(`<pre class="bg-gray-900 text-gray-100 rounded-xl p-4 overflow-x-auto my-6 whitespace-pre-wrap"><div class="text-xs text-gray-400 mb-2">${l||"text"}</div><code>${escapeHtml(c)}</code></pre>`);
                    return`@@C${id}@@`;
                });
                let h=s
                .replace(/<ref>([\s\S]*?)<\/ref>/gis, (m, b) => {
                    let text = b.trim();
                    let f = {};
                    const citeMatch = text.match(/\{\{cite([\s\S]*?)\}\}/i);
                    if (citeMatch) {
                        const body = citeMatch[1];
                        body.split("|").forEach(p => {
                            let [k, ...v] = p.split("=");
                            if (!k || v.length === 0) return;
                            f[k.trim().toLowerCase()] = v.join("=").trim();
                        });
                    } else {
                        f.title = text || "";
                        f.url = "";
                    }
                    refs.push({
                        title: f.title || "",
                        url: f.url || "",
                        work: f.work || f.publisher || "",
                        date: f.date || ""
                    });
                    return `<sup><a href="#ref-${refs.length}" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">[${refs.length}]</a></sup>`;
                })
                .replace(/^==== (.*?) ====/gm,(m,t)=>`<h4 id="${t.toLowerCase().replace(/\s+/g,"-")}" class="text-lg font-bold mt-4 mb-2">${t}</h4>`)
                .replace(/^=== (.*?) ===/gm,(m,t)=>`<h3 id="${t.toLowerCase().replace(/\s+/g,"-")}" class="text-xl font-bold mt-5 mb-2">${t}</h3>`)
                .replace(/^== (.*?) ==/gm,(m,t)=>(toc.push({id:t.toLowerCase().replace(/\s+/g,"-"),title:t,level:2}),`<h2 id="${t.toLowerCase().replace(/\s+/g,"-")}" class="text-2xl font-bold mt-8 mb-4">${t}</h2>`))
                .replace(/^= (.*?) =/gm,(m,t)=>(toc.push({id:t.toLowerCase().replace(/\s+/g,"-"),title:t,level:1}),`<h1 id="${t.toLowerCase().replace(/\s+/g,"-")}" class="text-4xl font-extrabold mt-10 mb-6">${t}</h1>`))
                .replace(/\{\{Infobox([\s\S]*?)\}\}/g,(m,b)=>{
                let title="",img="",cap="",d={};
                b.split("\n").forEach(l=>{
                let[k,...v]=l.replace(/^\s*\|\s*/,"").split("=");
                if(!k)return;
                k=k.trim();
                v=v.join("=").trim();
                if(k==="name")title=v;
                else if(k==="image")img=v;
                else if(k==="caption")cap=v;
                else d[k]=v;
                });
                return `
                <div class="w-full max-w-sm float-right ml-6 mb-6 border rounded-xl overflow-hidden bg-gray-50 dark:bg-[#0f172a] shadow">
                ${title?`<div class="bg-gray-200 dark:bg-gray-800 px-3 py-2 font-bold text-center">${title}</div>`:""}
                ${img?`<img src="${img}" class="w-full object-cover">`:""}
                ${cap?`<div class="text-xs text-gray-500 p-2 border-b text-center">${cap}</div>`:""}
                <div class="p-3 text-sm space-y-1">
                ${Object.entries(d).map(([k,v])=>
                `<div class="flex justify-between gap-2"><span class="font-semibold text-gray-600 dark:text-gray-300">${k}</span><span class="text-right">${v}</span></div>`
                ).join("")}
                </div>
                </div>`;
                })
                .replace(/\[\[(.*?)\]\]/g,'<a href="#" data-internal-link="$1" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">$1</a>')
                .replace(/\[(https?:\/\/[^\]\s]+)\s+([^\]]+)\]/g,'<a href="$1" class="text-blue-600 dark:text-blue-400 hover:underline">$2</a>')
                .replace(/\{\|[\s\S]*?\|\}/g,parseTable)
                .replace(/'''(.*?)'''/g,"<b>$1</b>")
                .replace(/''(.*?)''/g,"<i>$1</i>")
                .replace(/__(.*?)__/g,"<u>$1</u>")
                .replace(/`([^`\n]+)`/g,'<code class="bg-gray-200 px-1 rounded">$1</code>')
                .replace(/^> (.*)$/gm,'<blockquote>$1</blockquote>')
                .replace(/\{\{Note\|(.*?)\}\}/g,'<div class="my-4 rounded-xl border-l-4 border-blue-500 bg-blue-50 dark:bg-blue-900/20 p-4"><strong>Note:</strong> $1</div>')
                .replace(/\{\{Warning\|(.*?)\}\}/g,'<div class="my-4 rounded-xl border-l-4 border-red-500 bg-red-50 dark:bg-red-900/20 p-4"><strong>Warning:</strong> $1</div>')
                .replace(/^\* (.*)/gm,'<li class="ml-6 list-disc mb-1">$1</li>')
                .replace(/^# (.*)/gm,'<li class="ml-6 list-decimal mb-1">$1</li>')
                .split("\n\n")
                .map(p=>{
                if(p.startsWith("<h")||p.startsWith("<li")||p.startsWith("<pre"))return p;
                return`<p>${p}</p>`;
                }).join("");
                if(refs.length){
                    h+=`
                    <h2 id="references" class="text-2xl font-bold mt-8 mb-4 border-b border-gray-200 dark:border-gray-700 pb-2">
                    References
                    </h2>
                    <ol class="list-decimal ml-6 space-y-3">
                    ${refs.map((r,i)=>`
                    <li id="ref-${i+1}">
                    <a href="${r.url}" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">
                    ${r.title}
                    </a>
                    <div class="text-xs text-gray-500 mt-1">
                    ${r.work ? `<span>${r.work}</span>` : ""} ${r.date ? `• ${r.date}` : ""}
                    </div>
                    </li>
                    `).join("")}
                    </ol>`;
                }
                h=h.replace(/@@C(\d+)@@/g,(_,i)=>blocks[i]);
                return{html:h,toc};
            };
            const getSeededRandom = (seed) => {
                let x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };
            const reviewArticleWithAI = async (title, content) => {
                const API_KEY = "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";
                try {
                    const prompt = `You are a moderator for a modern encyclopedia called LBmedia. Review the draft.
Title: "${title}"
Content: "${content}"
Evaluate:
Before anything else, quickly reject submissions that clearly break the basic rules or are obviously not allowed.
Then check if the topic is actually important enough for an encyclopedia and whether it has reliable sources to support it. After that, read the whole article to make sure it is written in a neutral, informative, and encyclopedic style. If the topic is not important or has no proof, it should be declined no matter how well it is written. If everything checks out and there are no issues, the submission can be safely accepted.
Respond strictly in JSON format without markdown wrapping: {"accepted": boolean, "reasons": ["Array of strings"]}`;
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            Authorization: `Bearer ${API_KEY}`,
                        },
                        body: JSON.stringify({
                            model: "llama-3.1-8b-instant",
                            messages: [
                                {
                                    role: "user",
                                    content: prompt,
                                },
                            ],
                            temperature: 0.2,
                        }),
                    });
                    const data = await response.json();
                    const text = data?.choices?.[0]?.message?.content;
                    return JSON.parse(text || '{"accepted": false, "reasons": ["Parse error"]}');
                } catch (err) {
                    return { accepted: false, reasons: ["AI service error."] };
                }
            };
            window.app = {
                toggleDarkMode: () => {
                    state.darkMode = !state.darkMode;
                    document.documentElement.classList.toggle("dark", state.darkMode);
                    render();
                },
                randomArticle: () => {
                    const published = state.articles.filter(a => a.status === "published");
                    if (!published.length) return alert("No articles available!");
                    const random = published[Math.floor(Math.random() * published.length)];
                    window.app.navigateToArticle(random.id);
                },
                navigate: async (view, id = null) => {
                    state.currentView = view;
                    if (view === "article") state.activeArticleId = id;
                    if (view !== "editor") state.editor.isProtected = false;
                    if (view === "editor") {
                        state.activeDraftId = id;
                        render();
                        if (id) await loadDraftData(id);
                        return;
                    }
                    state.searchQuery = "";
                    render();
                },
                clearNotifications: async () => {
                    if (!state.user) return;
                    if (!confirm("Clear all notifications?")) return;
                    try {
                        const colRef = getPrivateCol(state.user.uid, "notifications");
                        const snapshot = await getDocs(colRef);
                        const deletes = snapshot.docs.map((d) => deleteDoc(doc(colRef, d.id)));
                        await Promise.all(deletes);
                    } catch (e) {
                        console.error(e);
                    }
                },
                deleteDraft: async (id) => {
                    if (!state.user) return;
                    if (!confirm("Delete this draft?")) return;
                    try {
                        await deleteDoc(doc(getPrivateCol(state.user.uid, "drafts"), id));
                        if (state.activeDraftId === id) {
                            state.activeDraftId = null;
                            state.editor = {
                                title: "",
                                content: "",
                                lastSaved: null,
                            };
                        }
                        render();
                    } catch (err) {
                        console.error(err);
                    }
                },
                navigateToArticle: async (id) => {
                    window.app.navigate("article", id);
                    try {
                        if (!state.user) return;
                        const ref = doc(getPublicCol("articles"), id);
                        const d = await getDoc(ref);
                        if (d.exists()) await updateDoc(ref, { visits: (d.data().visits || 0) + 1 });
                    } catch (e) {
                        console.error("Visit tracking error", e);
                    }
                },
                handleSearch: (e) => {
                    state.searchQuery = e.target.value;
                    const searchDropdown = document.getElementById("search-dropdown");
                    if (searchDropdown) {
                        const results = state.articles
                            .filter(
                                (a) =>
                                    a.status === "published" &&
                                    (a.title.toLowerCase().includes(state.searchQuery.toLowerCase()) ||
                                        a.content.toLowerCase().includes(state.searchQuery.toLowerCase()))
                            )
                            .slice(0, 5);
                        if (!state.searchQuery.trim()) {
                            searchDropdown.innerHTML = "";
                            searchDropdown.classList.add("hidden");
                            return;
                        }
                        searchDropdown.classList.remove("hidden");
                        searchDropdown.innerHTML =
                            results.length > 0
                                ? results
                                      .map(
                                          (r) => `
            <div onclick="window.app.navigateToArticle('${r.id}')" class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer flex flex-col transition-colors border-b border-gray-100 dark:border-gray-800 last:border-0">
              <span class="font-semibold text-gray-900 dark:text-white">${r.title}</span>
              <span class="text-sm text-gray-500 dark:text-gray-400 truncate">${getArticlePreview(r.content || "", 80)}...</span>
            </div>
          `
                                      )
                                      .join("")
                                : `<div class="px-4 py-4 text-center text-gray-500">No results found.</div>`;
                    }
                },
                openAuthModal: (mode = "login") => {
                    state.authModalOpen = true;
                    state.authMode = mode;
                    render();
                },
                closeAuthModal: () => {
                    state.authModalOpen = false;
                    render();
                },
                switchAuthMode: (mode) => {
                    state.authMode = mode;
                    render();
                },
                submitAuth: async (e) => {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const password = e.target.password.value;
                    const username = e.target.username ? e.target.username.value : "";
                    const btn = document.getElementById("auth-submit-btn");
                    btn.innerHTML = `<i data-lucide="refresh-cw" class="animate-spin mx-auto"></i>`;
                    lucide.createIcons();
                    try {
                        if (state.authMode === "signup") {
                            const cred = await createUserWithEmailAndPassword(auth, email, password);
                            await setDoc(doc(getPublicCol("users"), cred.user.uid), {
                                uid: cred.user.uid,
                                username,
                                email,
                                joinDate: Date.now(),
                                role: "user",
                                publishedCount: 0,
                            });
                            localStorage.setItem("lbmedia_email", email);
                            localStorage.setItem("lbmedia_password", password);
                        } else {
                            await signInWithEmailAndPassword(auth, email, password);
                            localStorage.setItem("lbmedia_email", email);
                            localStorage.setItem("lbmedia_password", password);
                        }
                        state.authModalOpen = false;
                    } catch (err) {
                        alert(err.message);
                    }
                    render();
                },
                logout: () => {
                    localStorage.removeItem("lbmedia_email");
                    localStorage.removeItem("lbmedia_password");
                    signOut(auth);
                    window.app.navigate("home");
                },
                createNewDraft: async (initialTitle = "") => {
                    if (!state.user) return window.app.openAuthModal("login");
                    try {
                        const newDraftRef = doc(getPrivateCol(state.user.uid, "drafts"));
                        await setDoc(newDraftRef, {
                            title: initialTitle,
                            content: "",
                            status: "draft",
                            lastEdited: Date.now(),
                            authorUid: state.user.uid,
                            authorName: state.userData?.username || "Unknown",
                        });
                        window.app.navigate("editor", newDraftRef.id);
                    } catch (err) {
                        console.error(err);
                    }
                },
                handleEditorInput: (field, value) => {
                    state.editor[field] = value;
                    if (field === "content") {
                        const parsed = parseWiki(value);
                        document.getElementById("editor-preview").innerHTML =
                            parsed.html || '<p class="text-gray-400 italic">Preview will appear here...</p>';
                    }
                    if (field === "title") {
                        document.getElementById("editor-preview-title").innerText = value || "Untitled Draft";
                        state.editor.isProtected = isWikiProtectedPage(value);
                    }
                    clearTimeout(autoSaveTimer);
                    document.getElementById("editor-save-status").innerHTML =
                        `<i data-lucide="refresh-cw" class="w-4 h-4 mr-1.5 animate-spin"></i> Saving...`;
                    lucide.createIcons();
                    autoSaveTimer = setTimeout(async () => {
                        if (!state.activeDraftId ||!state.user ||state.editor.isEditingArticle) return;
                        try {
                            await updateDoc(doc(getPrivateCol(state.user.uid, "drafts"), state.activeDraftId), {
                                title: state.editor.title,
                                content: state.editor.content,
                                lastEdited: Date.now(),
                            });
                            const time = new Date().toLocaleTimeString();
                            document.getElementById("editor-save-status").innerHTML =
                                `<i data-lucide="save" class="w-4 h-4 mr-1.5"></i> Saved ${time}`;
                            lucide.createIcons();
                        } catch (e) {
                            console.error("Autosave failed", e);
                        }
                    }, 1500);
                },
                proposeEdit: async (articleId) => {
                    if (!state.user) {
                        window.app.openAuthModal("login");
                        return;
                    }
                    const article = state.articles.find(a => a.id === articleId);
                    if (!article) return;
                    state.activeDraftId = null;
                    state.editor = {
                        title: article.title,
                        content: article.content,
                        articleId: article.id,
                        isEditingArticle: true,
                        isSaving: false,
                        isPublishing: false,
                        lastSaved: null,
                        isProtected: isWikiProtectedPage(article.title)
                    };
                    state.currentView = "editor";
                    render();
                },
                publishDraft: async () => {
                    const isProtected = isWikiProtectedPage(state.editor.title);
                    if (isProtected && !isAdminUser(state.userData)) {
                        alert("This Wiki page is protected and cannot be published.");
                        return;
                    }
                    if (!state.user) return;
                    if (!state.editor.title.trim() || !state.editor.content.trim())
                        return alert("Title and content cannot be empty.");
                    const btn = document.getElementById("publish-btn");
                    btn.disabled = true;
                    btn.innerHTML = `<i data-lucide="refresh-cw" class="w-5 h-5 animate-spin mr-2"></i> Reviewing...`;
                    lucide.createIcons();
                    
                    const draftRef = doc(getPrivateCol(state.user.uid, "drafts"), state.activeDraftId);
                    await updateDoc(draftRef, { status: "reviewing" });
                    const review = await reviewArticleWithAI(state.editor.title, state.editor.content);
                    await addDoc(getPublicCol("reviews"), {
                        draftId: state.activeDraftId,
                        authorUid: state.user.uid,
                        title: state.editor.title,
                        accepted: review.accepted,
                        reasons: review.reasons,
                        timestamp: Date.now(),
                    });
                    if (review.accepted) {
                        const draftSnap = await getDoc(draftRef);
                        const draftData = draftSnap.data();
                        let articleRef;
                        let versionSummary;
                        if (state.editor.isEditingArticle) {
                            const review = await reviewArticleWithAI(
                                state.editor.title,
                                state.editor.content
                            );
                            if (!review.accepted) {
                                alert(`Edit rejected:\n\n- ${review.reasons.join("\n- ")}`);
                                return;
                            }
                            await updateDoc(
                                doc(getPublicCol("articles"), state.editor.articleId),
                                {
                                    title: state.editor.title,
                                    content: state.editor.content,
                                    updatedAt: Date.now(),
                                }
                            );
                            await addDoc(getPrivateCol(state.user.uid, "notifications"), {
                                message: `Your edit to "${state.editor.title}" was approved!`,
                                type: "success",
                                timestamp: Date.now(),
                                read: false,
                            });

                const saveText = state.editor.lastSaved
                    ? `Saved ${state.editor.lastSaved.toLocaleTimeString()}`
                    : "Draft";
                return `
        <div class="h-[calc(100vh-8rem)] flex flex-col bg-white dark:bg-[#1e293b] rounded-3xl overflow-hidden border border-gray-200 dark:border-gray-800 shadow-xl animate-fade-in relative z-20">

                <i data-lucide="check" class="w-5 h-5"></i> <span>Publish</span>

                <i data-lucide="x" class="w-6 h-6"></i>
              </button>
            </div>
          </header>
          ${isProtected ? `
            <div class="w-full px-6 py-3 text-sm font-medium border-b ${admin

                : "bg-red-50 text-red-700 border-red-200 dark:bg-red-900/20 dark:text-red-300"
            }">
            <i data-lucide="lock"></i> This is a protected Wiki page that is not meant for the encyclopedia. ${

                ? "You have admin access."
                : "You cannot edit or publish this page."
            }
            </div>
            ` : ""}

              <textarea oninput="window.app.handleEditorInput('content', this.value)" placeholder="Start writing using Wiki markup..." class="flex-1 w-full p-6 bg-transparent resize-none outline-none text-gray-800 dark:text-gray-200 font-mono text-sm leading-relaxed custom-scrollbar">${state.editor.content}</textarea>
            </div>

                ${state.editor.title || "Untitled Draft"}
              </h1>
              <div id="editor-preview" class="prose prose-blue dark:prose-invert max-w-none">
                ${parsedPreview}

            </div>
          </div>
        </div>`;

              <button onclick="window.app.clearNotifications()" class="text-xs px-3 py-1 rounded-lg bg-gray-100 dark:bg-[#0f172a] border border-gray-200 dark:border-gray-700 hover:bg-red-50 hover:text-red-600 dark:hover:bg-red-900/20 transition">

              ${
                  state.notifications.length > 0

                <div onclick="window.app.markNotifRead('${n.id}')" class="p-4 rounded-xl border flex items-start space-x-3 cursor-pointer transition-colors ${!n.read ? "bg-blue-50/50 dark:bg-blue-900/10 border-blue-100 dark:border-blue-900" : "bg-gray-50 dark:bg-[#0f172a] border-gray-100 dark:border-gray-800 opacity-70"}">
                  <i data-lucide="${n.type === "success" ? "check" : n.type === "error" ? "alert-circle" : "bell"}" class="mt-0.5 w-4 h-4 ${n.type === "success" ? "text-green-500" : n.type === "error" ? "text-red-500" : "text-blue-500"}"></i>

  <button onclick="event.stopPropagation(); window.app.deleteDraft('${d.id}')"class="absolute top-3 right-3 text-gray-400 hover:text-red-500 transition"title="Delete draft">

</div>`

              }
            </div>
          </section>
        </div>
      </div>`;
            const renderAuthModal = () => `

              <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center text-white shadow-lg"><i data-lucide="lock" class="w-8 h-8"></i></div>
            </div>

            <form onsubmit="window.app.submitAuth(event)" class="space-y-4">
              ${

                      ? `

                <input name="username" type="text" required class="w-full bg-gray-50 dark:bg-[#0f172a] border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. WikiScholar" /></div>
              `
                      : ""
              }
              <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 ml-1">Email</label>
              <input name="email" type="email" required class="w-full bg-gray-50 dark:bg-[#0f172a] border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="you@example.com" /></div>

              <button id="auth-submit-btn" type="submit" class="w-full py-3.5 rounded-xl bg-blue-600 text-white font-bold text-lg hover:bg-blue-700 transition-colors mt-6 shadow-lg shadow-blue-500/30">
                ${state.authMode === "login" ? "Sign In" : "Sign Up"}

            </form>
            <div class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">

              <button class="font-bold text-blue-600 dark:text-blue-400 hover:underline" onclick="window.app.switchAuthMode('${state.authMode === "login" ? "signup" : "login"}')">${state.authMode === "login" ? "Sign Up" : "Sign In"}</button>
            </div>
          </div>
        </div>
      </div>`;

            render();
        </script>

    <body id="app-root" class="bg-gray-50 text-gray-900 min-h-screen transition-colors duration-300 font-sans">
